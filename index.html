<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 工坊 — 免費線上 PDF 工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --ink:#1c1917; --ink-soft:#57534e;
  --paper:#faf7f2; --card:#ffffff; --line:#e7e0d5;
  --accent:#c2410c; --accent-deep:#9a3412; --accent-soft:#fff1e8;
  --ok:#166534; --ok-soft:#ecfdf3;
  --radius:14px;
  --shadow:0 1px 2px rgba(28,25,23,.05),0 8px 24px -12px rgba(28,25,23,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--paper);
  background-image:radial-gradient(circle at 15% 0%, #fdf3e7 0%, transparent 40%),radial-gradient(circle at 100% 100%, #f3ede2 0%, transparent 45%);
  color:var(--ink);min-height:100vh;
}
header{
  padding:16px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  border-bottom:1px solid var(--line);
  background:rgba(250,247,242,.85);backdrop-filter:blur(8px);
  position:sticky;top:0;z-index:20;
}
.logo{font-family:'Noto Serif TC',serif;font-weight:900;font-size:1.35rem;letter-spacing:.02em;cursor:pointer}
.logo em{font-style:normal;color:var(--accent)}
.header-note{margin-left:auto;font-size:.78rem;color:var(--ink-soft);display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ok);display:inline-block}
.lang-sel{
  font-family:inherit;font-size:.82rem;padding:7px 10px;border:1px solid var(--line);
  border-radius:999px;background:#fff;color:var(--ink);cursor:pointer;
}
.lang-sel:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
main{max-width:1080px;margin:0 auto;padding:40px 24px 80px}
.hero{text-align:center;margin-bottom:44px}
.hero h1{font-family:'Noto Serif TC',serif;font-weight:900;font-size:clamp(1.8rem,4vw,2.7rem);line-height:1.25}
.hero h1 span{color:var(--accent)}
.hero p{margin-top:12px;color:var(--ink-soft);font-size:.95rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.cat-tabs{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:30px}
.cat-tab{
  font-family:inherit;font-size:.88rem;font-weight:500;cursor:pointer;
  border:1px solid var(--line);background:#fff;color:var(--ink-soft);
  border-radius:999px;padding:9px 22px;transition:all .18s ease;
  box-shadow:0 1px 2px rgba(28,25,23,.04);
}
.cat-tab:hover{border-color:#d9c9b4;color:var(--ink)}
.cat-tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.tool-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 20px;cursor:pointer;box-shadow:var(--shadow);
  transition:transform .18s ease,border-color .18s ease;position:relative;overflow:hidden;
}
.tool-card::after{
  content:"";position:absolute;inset:0 auto 0 0;width:4px;background:var(--accent);
  transform:scaleY(0);transform-origin:bottom;transition:transform .2s ease;
}
.tool-card:hover{transform:translateY(-3px);border-color:#d9c9b4}
.tool-card:hover::after{transform:scaleY(1)}
.tool-ico{font-size:1.7rem;margin-bottom:10px;display:block}
.tool-card h3{font-size:1.02rem;font-weight:700;margin-bottom:6px}
.tool-card p{font-size:.8rem;color:var(--ink-soft);line-height:1.55}
.workspace{display:none}
.back{
  display:inline-flex;align-items:center;gap:6px;font-size:.85rem;color:var(--ink-soft);
  cursor:pointer;margin-bottom:20px;border:none;background:none;font-family:inherit;
}
.back:hover{color:var(--accent)}
.ws-title{font-family:'Noto Serif TC',serif;font-weight:900;font-size:1.6rem;margin-bottom:6px}
.ws-desc{color:var(--ink-soft);font-size:.88rem;margin-bottom:24px}
.dropzone{
  border:2px dashed #d6c7ae;border-radius:var(--radius);background:var(--card);
  padding:56px 24px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;
}
.dropzone.drag{border-color:var(--accent);background:var(--accent-soft)}
.dropzone .big{font-size:2.2rem;display:block;margin-bottom:10px}
.dropzone strong{font-size:1.05rem}
.dropzone small{display:block;margin-top:8px;color:var(--ink-soft)}
.filelist{margin-top:18px;display:flex;flex-direction:column;gap:8px}
.file-row{
  background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:12px 16px;display:flex;align-items:center;gap:12px;font-size:.88rem;
}
.file-row .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.file-row .fmeta{color:var(--ink-soft);font-size:.78rem;white-space:nowrap}
.icon-btn{
  border:1px solid var(--line);background:#fff;border-radius:8px;width:30px;height:30px;
  cursor:pointer;font-size:.85rem;line-height:1;color:var(--ink-soft);
}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.options{
  margin-top:22px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);padding:20px;display:none;box-shadow:var(--shadow);
}
.options h4{font-size:.92rem;margin-bottom:14px;font-weight:700}
.opt-row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:12px;font-size:.88rem}
.opt-row:last-child{margin-bottom:0}
.opt-row label{color:var(--ink-soft);min-width:88px}
input[type=text],input[type=number],select{
  font-family:inherit;font-size:.88rem;padding:8px 12px;border:1px solid var(--line);
  border-radius:8px;background:#fff;color:var(--ink);min-width:180px;
}
input:focus,select:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
.chip-group{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 16px;
  font-size:.84rem;cursor:pointer;font-family:inherit;color:var(--ink-soft);
}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.page-grid{margin-top:22px;display:none;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:14px}
.page-grid.show{display:grid}
.grid-note{margin-top:18px;font-size:.84rem;color:var(--ink-soft);display:none}
.grid-note.show{display:block}
.page-thumb{
  background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:8px 8px 6px;cursor:grab;position:relative;
  box-shadow:var(--shadow);user-select:none;
  transition:transform .15s ease,border-color .15s ease;
}
.page-thumb:hover{border-color:#d9c9b4;transform:translateY(-2px)}
.page-thumb.dragging{opacity:.35;cursor:grabbing;border-color:var(--accent)}
.page-thumb img{width:100%;display:block;border:1px solid #eee;border-radius:5px;pointer-events:none;background:#fff}
.page-thumb .pnum{
  position:absolute;top:-8px;left:-8px;background:var(--ink);color:#fff;
  font-size:.7rem;font-weight:700;border-radius:999px;padding:3px 9px;box-shadow:var(--shadow);
}
.page-thumb .src{display:block;text-align:center;font-size:.7rem;color:var(--ink-soft);margin-top:6px}
.page-thumb .nudges{position:absolute;bottom:30px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.page-thumb:hover .nudges{opacity:1}
.nudge{
  border:1px solid var(--line);background:#fff;border-radius:6px;width:26px;height:26px;
  cursor:pointer;font-size:.75rem;line-height:1;color:var(--ink-soft);
}
.nudge:hover{border-color:var(--accent);color:var(--accent)}
.page-thumb .ph{width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;font-size:2rem;background:#f6f1e8;border:1px solid #eee;border-radius:5px}
.page-thumb .fname2{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;color:var(--ink)}
.page-thumb .rm{
  position:absolute;top:-8px;right:-8px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);
  width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:.7rem;line-height:1;box-shadow:var(--shadow);
}
.page-thumb .rm:hover{border-color:#b91c1c;color:#b91c1c}
@media (hover:none){.page-thumb .nudges{opacity:1}}
.page-thumb.selectable{cursor:pointer}
.page-thumb.sel-del{border-color:#b91c1c;box-shadow:0 0 0 2px rgba(185,28,28,.25)}
.page-thumb.sel-del img{opacity:.4}
.page-thumb.sel-keep{border-color:#166534;box-shadow:0 0 0 2px rgba(22,101,52,.25)}
.page-thumb.cut{border-right:4px solid var(--accent)}
.page-thumb .mark{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:.95rem;box-shadow:var(--shadow)}
.pv{margin-top:22px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;display:none;text-align:center;box-shadow:var(--shadow)}
.pv-cap{font-size:.8rem;color:var(--ink-soft);margin-bottom:10px}
.pv canvas{max-width:100%;max-height:70vh;width:auto;height:auto;border:1px solid var(--line);box-shadow:0 2px 10px rgba(0,0,0,.08)}
.run-bar{margin-top:24px;display:none;text-align:center}
.btn-primary{
  font-family:inherit;font-size:1rem;font-weight:700;letter-spacing:.05em;
  background:var(--accent);color:#fff;border:none;border-radius:999px;
  padding:15px 52px;cursor:pointer;box-shadow:0 8px 20px -8px rgba(194,65,12,.55);
  transition:background .2s,transform .15s;
}
.btn-primary:hover{background:var(--accent-deep);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.progress{margin-top:18px;display:none}
.progress .bar{height:8px;border-radius:99px;background:#efe8db;overflow:hidden}
.progress .fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),#f59e0b);transition:width .2s}
.progress .ptext{font-size:.8rem;color:var(--ink-soft);margin-top:8px;text-align:center}
.result{
  margin-top:22px;display:none;background:var(--ok-soft);border:1px solid #bbe5c8;
  border-radius:var(--radius);padding:24px;text-align:center;
}
.result h4{color:var(--ok);margin-bottom:6px;font-size:1.05rem}
.result p{font-size:.84rem;color:var(--ink-soft);margin-bottom:16px}
.btn-dl{
  display:inline-block;font-weight:700;background:var(--ok);color:#fff;border:none;
  border-radius:999px;padding:12px 40px;cursor:pointer;font-family:inherit;font-size:.95rem;
  text-decoration:none;margin:4px;
}
.btn-dl:hover{background:#14532d}
.btn-again{background:none;border:none;color:var(--ink-soft);text-decoration:underline;cursor:pointer;font-family:inherit;font-size:.82rem;margin-top:10px}
.hint{font-size:.78rem;color:var(--ink-soft);margin-top:10px;line-height:1.6}
footer{text-align:center;padding:30px;font-size:.75rem;color:var(--ink-soft);border-top:1px solid var(--line)}
@media(max-width:560px){.opt-row label{min-width:100%}.header-note{display:none}}
</style>
</head>
<body>

<header>
  <div class="logo" id="brand" onclick="goHome()">PDF<em>工坊</em></div>
  <div class="header-note"><span class="dot"></span><span id="headerNote"></span></div>
  <select class="lang-sel" id="langSel" onchange="setLang(this.value)">
    <option value="zh-TW">繁體中文</option>
    <option value="zh-CN">简体中文</option>
    <option value="en">English</option>
    <option value="ja">日本語</option>
    <option value="ko">한국어</option>
  </select>
</header>

<main>
  <section id="home">
    <div class="hero">
      <h1 id="heroTitle"></h1>
      <p id="heroSub"></p>
    </div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="grid" id="toolGrid"></div>
  </section>

  <section id="workspace" class="workspace">
    <button class="back" id="btnBack" onclick="goHome()"></button>
    <h2 class="ws-title" id="wsTitle"></h2>
    <p class="ws-desc" id="wsDesc"></p>

    <div class="dropzone" id="dropzone">
      <span class="big">📄</span>
      <strong id="dzText"></strong>
      <small id="dzHint"></small>
      <input type="file" id="fileInput" hidden>
    </div>

    <div class="filelist" id="fileList"></div>
    <div class="grid-note" id="gridNote"></div>
    <div class="page-grid" id="pageGrid"></div>
    <div class="options" id="optionsBox"></div>
    <div class="pv" id="previewBox">
      <div class="pv-cap" id="pvCap"></div>
      <canvas id="pvCanvas"></canvas>
    </div>

    <div class="run-bar" id="runBar">
      <button class="btn-primary" id="runBtn" onclick="runTool()"></button>
      <div class="progress" id="progress">
        <div class="bar"><div class="fill" id="progFill"></div></div>
        <div class="ptext" id="progText"></div>
      </div>
    </div>

    <div class="result" id="resultBox">
      <h4 id="resTitle"></h4>
      <p id="resultMeta"></p>
      <div id="dlButtons"></div>
      <br><button class="btn-again" id="btnAgain" onclick="resetTool()"></button>
    </div>
  </section>
</main>

<footer id="footNote"></footer>

<script>
/* ================================================================
   PDF 工坊 — 純前端 PDF 工具箱(多語系版)
   引擎:pdf-lib(編輯/組裝) + pdf.js(渲染) + JSZip(打包)
================================================================ */

/* pdf.js worker 三段式載入策略:
   1. 預設 workerSrc = cdnjs 網址 → 任何環境都能以 fake worker(主執行緒)運作
   2. 嘗試 fetch worker 程式碼轉 blob URL,並「實際建立測試 Worker」驗證
   3. 驗證通過才切換到 blob(真背景執行緒);失敗(如沙箱改寫 blob 協定)則維持 cdnjs
   這樣桌機得到效能,受限環境保證能動。 */
const PDFJS_WORKER_URL = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER_URL;
(async () => {
  try {
    const resp = await fetch(PDFJS_WORKER_URL);
    if (!resp.ok) return;
    const code = await resp.text();
    const blobUrl = URL.createObjectURL(new Blob([code], { type: "application/javascript" }));
    await new Promise((resolve, reject) => {
      let w;
      try { w = new Worker(blobUrl); } catch (e) { reject(e); return; }
      const timer = setTimeout(() => { w.terminate(); resolve(); }, 400); // 400ms 內無錯誤 = 可用
      w.onerror = err => { clearTimeout(timer); w.terminate(); reject(err); };
    });
    pdfjsLib.GlobalWorkerOptions.workerSrc = blobUrl; // 驗證通過才切換
  } catch (_) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER_URL; // 維持可用的 fake worker 路線
  }
})();

const { PDFDocument, degrees, rgb, StandardFonts } = PDFLib;

let LANG = "zh-TW";
function t(key, vars) {
  let s = (I18N[LANG] && I18N[LANG][key] !== undefined) ? I18N[LANG][key]
        : (I18N["en"][key] !== undefined) ? I18N["en"][key]
        : (I18N["zh-TW"][key] !== undefined) ? I18N["zh-TW"][key] : key;
  if (vars) for (const k in vars) s = s.split("{" + k + "}").join(vars[k]);
  return s;
}
function detectLang() {
  const nav = (navigator.language || "en").toLowerCase();
  if (nav.startsWith("zh")) {
    return (nav.includes("tw") || nav.includes("hant") || nav.includes("hk") || nav.includes("mo")) ? "zh-TW" : "zh-CN";
  }
  if (nav.startsWith("ja")) return "ja";
  if (nav.startsWith("ko")) return "ko";
  return "en";
}
function setLang(l) {
  if (!I18N[l]) l = "en";
  LANG = l;
  document.getElementById("langSel").value = l;
  document.documentElement.lang = l === "zh-TW" ? "zh-Hant" : l === "zh-CN" ? "zh-Hans" : l;
  applyStatic();
  renderTabs();
  renderToolGrid();
  if (currentTool) {
    applyToolHeader();
    renderFiles();
    renderOptions();
    if (pageThumbs.length) {
      document.getElementById("gridNote").textContent = t(noteKeyFor(currentTool));
      if (currentTool === "reorder") renderPageGrid();
      else if (SELECT_TOOLS.includes(currentTool)) renderSelectGrid();
    }
    if (PREVIEW_TOOLS.includes(currentTool)) updatePreview();
  }
}
function applyStatic() {
  document.title = t("ui.title");
  document.getElementById("brand").innerHTML = t("brand");
  document.getElementById("headerNote").textContent = t("ui.note");
  document.getElementById("heroTitle").innerHTML = t("ui.heroTitle");

  document.getElementById("runBtn").textContent = t("ui.run");
  document.getElementById("resTitle").textContent = t("ui.done");
  document.getElementById("btnAgain").textContent = t("ui.again");
  document.getElementById("footNote").textContent = t("ui.footer");
}

function addFiles(list) {
  const cfg = TOOLS[currentTool];
  const exts = cfg.accept.split(",").map(s => s.trim().toLowerCase());
  const valid = list.filter(f => exts.some(ext => f.name.toLowerCase().endsWith(ext)));
  if (valid.length < list.length) alert(t("e.skip"));
  if (!cfg.multiple) files = valid.slice(0, 1);
  else files = files.concat(valid);
  renderFiles();
  renderOptions();
  if (files.length) {
    if (currentTool === "reorder") buildThumbs("reorder");
    else if (SELECT_TOOLS.includes(currentTool)) buildThumbs("select");
    else if (PREVIEW_TOOLS.includes(currentTool)) buildPreviewBase();
    if (cfg.multiple) ensureThumbs();
  }
}

/* ---- 通用拖曳排序行為(檔案卡片與頁面縮圖共用) ---- */
function addDragBehavior(card, container, onDrop) {
  // ---- 桌機:HTML5 原生拖曳 ----
  card.addEventListener("dragstart", e => {
    card.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", ""); } catch (_) {}
  });
  card.addEventListener("dragend", () => {
    card.classList.remove("dragging");
    onDrop();
  });
  card.addEventListener("dragenter", () => {
    const dragging = container.querySelector(".dragging");
    if (!dragging || dragging === card) return;
    reorderOnHover(container, dragging, card);
  });
  card.addEventListener("dragover", e => e.preventDefault());

  // ---- 手機:長按 350ms 啟動拖曳(啟動前滑動 = 捲動頁面,不誤觸) ----
  let lpTimer = null, touchDragging = false, sx = 0, sy = 0;
  card.addEventListener("touchstart", e => {
    if (e.touches.length !== 1) return;
    if (e.target.closest(".nudge") || e.target.closest(".rm")) return; // 按鈕不觸發長按
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    lpTimer = setTimeout(() => {
      touchDragging = true;
      card.classList.add("dragging");
      if (navigator.vibrate) navigator.vibrate(30);
    }, 350);
  }, { passive: true });
  card.addEventListener("touchmove", e => {
    const tp = e.touches[0];
    if (!touchDragging) {
      if (Math.hypot(tp.clientX - sx, tp.clientY - sy) > 10) clearTimeout(lpTimer);
      return;
    }
    e.preventDefault(); // 拖曳中,阻止頁面捲動
    const el = document.elementFromPoint(tp.clientX, tp.clientY);
    const over = el && el.closest(".page-thumb");
    if (over && over !== card && over.parentElement === container) {
      reorderOnHover(container, card, over);
    }
  }, { passive: false });
  const endTouch = () => {
    clearTimeout(lpTimer);
    if (touchDragging) {
      touchDragging = false;
      card.classList.remove("dragging");
      onDrop();
    }
  };
  card.addEventListener("touchend", endTouch);
  card.addEventListener("touchcancel", endTouch);
}
function reorderOnHover(container, moving, target) {
  const cards = [...container.children];
  if (cards.indexOf(moving) < cards.indexOf(target)) {
    container.insertBefore(moving, target.nextSibling);
  } else {
    container.insertBefore(moving, target);
  }
}
function syncFilesFromDom() {
  const box = document.getElementById("fileList");
  const order = [...box.children].map(c => parseInt(c.dataset.pos));
  files = order.map(i => files[i]);
  renderFiles();
}

/* ---- 檔案預覽縮圖:PDF 取第一頁,圖片直接縮放 ---- */
async function ensureThumbs() {
  for (const f of [...files]) {
    if (fileThumbMap.has(f) || thumbPending.has(f)) continue;
    thumbPending.add(f);
    const th = await genFileThumb(f);
    thumbPending.delete(f);
    fileThumbMap.set(f, th); // 失敗也記錄 null,避免反覆重試
    if (files.includes(f)) renderFiles();
  }
}
async function genFileThumb(file) {
  try {
    if (file.name.toLowerCase().endsWith(".pdf")) {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      const page = await pdf.getPage(1);
      const vp1 = page.getViewport({ scale: 1 });
      const vp = page.getViewport({ scale: 220 / vp1.width });
      const canvas = document.createElement("canvas");
      canvas.width = Math.floor(vp.width);
      canvas.height = Math.floor(vp.height);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      const url = canvas.toDataURL("image/jpeg", 0.75);
      pdf.destroy();
      return url;
    } else {
      const objUrl = URL.createObjectURL(file);
      const im = await new Promise((res, rej) => {
        const i = new Image();
        i.onload = () => res(i);
        i.onerror = rej;
        i.src = objUrl;
      });
      const scale = Math.min(1, 220 / im.width);
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.floor(im.width * scale));
      canvas.height = Math.max(1, Math.floor(im.height * scale));
      canvas.getContext("2d").drawImage(im, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(objUrl);
      return canvas.toDataURL("image/jpeg", 0.8);
    }
  } catch (e) {
    console.warn("thumb failed:", file.name, e);
    return null;
  }
}

/* ---------------- 共用小工具 ---------------- */
function fmtSize(b) {
  if (b > 1048576) return (b / 1048576).toFixed(2) + " MB";
  if (b > 1024) return (b / 1024).toFixed(1) + " KB";
  return b + " B";
}
function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
function baseName(name){return name.replace(/\.[^.]+$/,"");}

function parsePages(str, max) {
  const out = new Set();
  if (!str || !str.trim()) return null;
  for (const part of str.split(",")) {
    const p = part.trim();
    if (!p) continue;
    const m = p.match(/^(\d+)\s*-\s*(\d+)$/);
    if (m) {
      let a = +m[1], b = +m[2];
      if (a > b) [a, b] = [b, a];
      for (let n = a; n <= b; n++) if (n >= 1 && n <= max) out.add(n - 1);
    } else if (/^\d+$/.test(p)) {
      const n = +p;
      if (n >= 1 && n <= max) out.add(n - 1);
    } else {
      throw new Error(t("e.parse", { p }));
    }
  }
  if (!out.size) throw new Error(t("e.range"));
  return [...out].sort((a, b) => a - b);
}
function parseRangeGroups(str, max) {
  const groups = [];
  for (const part of (str || "").split(",")) {
    const p = part.trim();
    if (!p) continue;
    const pages = parsePages(p, max);
    if (pages) groups.push(pages);
  }
  if (!groups.length) throw new Error(t("e.needRange"));
  return groups;
}

}
function readBuf(file) { return file.arrayBuffer(); }

/* ---------------- 主流程 ---------------- */
async function runTool() {
  const btn = document.getElementById("runBtn");
  btn.disabled = true;
  document.getElementById("resultBox").style.display = "none";
  try {
    setProgress(5, t("m.read"));
    switch (currentTool) {
      case "merge":     await doMerge(); break;
      case "reorder":   await doReorder(); break;
      case "split":     await doSplit(); break;
      case "compress":  await doCompress(); break;
      case "pdf2jpg":   await doPdf2Jpg(); break;
      case "img2pdf":   await doImg2Pdf(); break;
      case "rotate":    await doRotate(); break;
      case "crop":      await doCrop(); break;
      case "repair":    await doRepair(); break;
      case "delete":    await doDelete(); break;
      case "extract":   await doExtract(); break;
      case "pagenum":   await doPageNum(); break;
      case "watermark": await doWatermark(); break;
    }
  } catch (err) {
    console.error(err);
    alert(t("e.fail") + (err.message || err));
    document.getElementById("progress").style.display = "none";
  } finally {
    btn.disabled = false;
  }
}

/* ---------------- 頁面排序:縮圖 + 拖曳 ---------------- */
function noteKeyFor(tool) {
  return tool === "delete" ? "ui.noteDel"
       : tool === "extract" ? "ui.noteExt"
       : tool === "split" ? "ui.noteSplit" : "ui.gridNote";
}
async function buildThumbs(mode = "reorder") {
  const runBtn = document.getElementById("runBtn");
  runBtn.disabled = true;
  const gridEl = document.getElementById("pageGrid");
  gridEl.innerHTML = "";
  gridEl.classList.add("show");
  const note = document.getElementById("gridNote");
  note.textContent = t(noteKeyFor(currentTool));
  note.classList.add("show");
  try {
    setProgress(5, t("m.readPdf"));
    const buf = await readBuf(files[0]);
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    pageThumbs = [];
    pageOrder = [];
    selPages = new Set();
    for (let i = 1; i <= pdf.numPages; i++) {
      setProgress(5 + (i / pdf.numPages) * 90, t("m.thumb", { i, n: pdf.numPages }));
      const page = await pdf.getPage(i);
      const vp1 = page.getViewport({ scale: 1 });
      const vp = page.getViewport({ scale: 260 / vp1.width });
      const canvas = document.createElement("canvas");
      canvas.width = Math.floor(vp.width);
      canvas.height = Math.floor(vp.height);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      pageThumbs.push(canvas.toDataURL("image/jpeg", 0.8));
      pageOrder.push(i - 1);
    }
    document.getElementById("progress").style.display = "none";
    if (mode === "reorder") {
      renderPageGrid();
    } else {
      syncSelToInput();
      renderSelectGrid();
    }
  } catch (e) {
    console.error(e);
    alert(t("e.thumb") + (e.message || e));
    document.getElementById("progress").style.display = "none";
  } finally {
    runBtn.disabled = false;
  }
}

function renderPageGrid() {
  const gridEl = document.getElementById("pageGrid");
  gridEl.innerHTML = "";
  pageOrder.forEach((srcIdx, pos) => {
    const card = document.createElement("div");
    card.className = "page-thumb";
    card.draggable = true;
    card.dataset.src = srcIdx;
    card.innerHTML = `
      <span class="pnum">${pos + 1}</span>
      <img src="${pageThumbs[srcIdx]}" alt="p${srcIdx + 1}">
      <span class="src">${t("ui.srcPage", { n: srcIdx + 1 })}</span>
      <span class="nudges">
        <button class="nudge" title="${t("ui.fwd")}" onclick="nudgePage(${pos},-1)">◀</button>
        <button class="nudge" title="${t("ui.bwd")}" onclick="nudgePage(${pos},1)">▶</button>
      </span>`;
    addDragBehavior(card, gridEl, syncOrderFromDom);
    gridEl.appendChild(card);
  });
}
function syncOrderFromDom() {
  const gridEl = document.getElementById("pageGrid");
  pageOrder = [...gridEl.children].map(c => parseInt(c.dataset.src));
  renderPageGrid();
}
function nudgePage(pos, dir) {
  const j = pos + dir;
  if (j < 0 || j >= pageOrder.length) return;
  [pageOrder[pos], pageOrder[j]] = [pageOrder[j], pageOrder[pos]];
  renderPageGrid();
}

/* ---------------- 分割/刪除/擷取:點選縮圖 ---------------- */
function renderSelectGrid() {
  const gridEl = document.getElementById("pageGrid");
  gridEl.innerHTML = "";
  const mode = currentTool;
  const last = pageThumbs.length - 1;
  pageThumbs.forEach((th, idx) => {
    const card = document.createElement("div");
    let cls = "page-thumb selectable", mark = "";
    if (selPages.has(idx)) {
      if (mode === "delete") { cls += " sel-del"; mark = "🗑️"; }
      else if (mode === "extract") { cls += " sel-keep"; mark = "✔"; }
      else if (mode === "split") { cls += " cut"; mark = "✂"; }
    }
    card.className = cls;
    card.innerHTML = `
      <span class="pnum">${idx + 1}</span>
      <img src="${th}" alt="p${idx + 1}">
      ${mark ? `<span class="mark">${mark}</span>` : ""}`;
    if (!(mode === "split" && idx === last)) { // 最後一頁之後無可分割
      card.onclick = () => {
        if (selPages.has(idx)) selPages.delete(idx);
        else selPages.add(idx);
        syncSelToInput();
        renderSelectGrid();
      };
    }
    gridEl.appendChild(card);
  });
}
// 已選頁碼(0-based 已排序)→ "1-3,5" 字串
function formatRanges(arr) {
  if (!arr.length) return "";
  const out = [];
  let a = arr[0], b = arr[0];
  for (let i = 1; i < arr.length; i++) {
    if (arr[i] === b + 1) { b = arr[i]; continue; }
    out.push(a === b ? `${a + 1}` : `${a + 1}-${b + 1}`);
    a = b = arr[i];
  }
  out.push(a === b ? `${a + 1}` : `${a + 1}-${b + 1}`);
  return out.join(",");
}
// 分割點集合 → 各段範圍 "1-3,4-7,8-10"
function splitSegmentsString() {
  const n = pageThumbs.length;
  const cuts = [...selPages].sort((x, y) => x - y).filter(c => c < n - 1);
  const segs = [];
  let start = 0;
  for (const c of cuts) { segs.push([start, c]); start = c + 1; }
  segs.push([start, n - 1]);
  return segs.map(([a, b]) => a === b ? `${a + 1}` : `${a + 1}-${b + 1}`).join(",");
}
function selInputId() {
  return currentTool === "delete" ? "deletePages"
       : currentTool === "extract" ? "extractPages" : "splitRanges";
}
function syncSelToInput() {
  const inp = document.getElementById(selInputId());
  if (!inp) return;
  if (currentTool === "split") inp.value = pageThumbs.length ? splitSegmentsString() : "";
  else inp.value = formatRanges([...selPages].sort((x, y) => x - y));
}
function syncSelFromInput() {
  const inp = document.getElementById(selInputId());
  if (!inp || !pageThumbs.length) return;
  try {
    if (currentTool === "split") {
      const groups = parseRangeGroups(inp.value, pageThumbs.length);
      const ends = groups.map(g => g[g.length - 1]).filter(e => e < pageThumbs.length - 1);
      selPages = new Set(ends);
    } else {
      selPages = new Set(parsePages(inp.value, pageThumbs.length) || []);
    }
    renderSelectGrid();
  } catch (_) { /* 輸入中途格式不完整,暫不同步 */ }
}

/* ---------------- 浮水印/頁碼:即時預覽 ---------------- */
async function buildPreviewBase() {
  previewBase = null;
  if (!files.length) { updatePreview(); return; }
  try {
    const buf = await files[0].arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const page = await pdf.getPage(1);
    const vp1 = page.getViewport({ scale: 1 });
    const scale = 560 / vp1.width;
    const vp = page.getViewport({ scale });
    const c = document.createElement("canvas");
    c.width = Math.floor(vp.width);
    c.height = Math.floor(vp.height);
    const ctx = c.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, c.width, c.height);
    await page.render({ canvasContext: ctx, viewport: vp }).promise;
    previewBase = { canvas: c, wPt: vp1.width, hPt: vp1.height, scale, numPages: pdf.numPages };
    pdf.destroy();
  } catch (e) {
    console.warn("preview base failed:", e);
    previewBase = null;
  }
  updatePreview();
}
function schedulePreview() {
  clearTimeout(pvTimer);
  pvTimer = setTimeout(updatePreview, 150);
}
function updatePreview() {
  const box = document.getElementById("previewBox");
  if (!PREVIEW_TOOLS.includes(currentTool) || !previewBase || !files.length) {
    box.style.display = "none";
    return;
  }
  const base = previewBase;
  const pv = document.getElementById("pvCanvas");
  pv.width = base.canvas.width;
  pv.height = base.canvas.height;
  const ctx = pv.getContext("2d");
  ctx.drawImage(base.canvas, 0, 0);
  const scl = base.scale; // px / pt

  if (currentTool === "pagenum") {
    const sizeEl = document.getElementById("pnSize");
    if (sizeEl) {
      const size = Math.max(6, Math.min(36, parseInt(sizeEl.value) || 11));
      const pos = document.getElementById("pnPos").value;
      const fmt = document.getElementById("pnFmt").value;
      const label = fmt === "slash" ? `1 / ${base.numPages}` : fmt === "dash" ? "- 1 -" : "1";
      ctx.font = `${size * scl}px Helvetica, Arial, sans-serif`;
      ctx.fillStyle = "#403a38";
      const tw = ctx.measureText(label).width;
      const x = pos === "bc" ? (pv.width - tw) / 2 : pos === "br" ? pv.width - tw - 36 * scl : 36 * scl;
      ctx.fillText(label, x, pv.height - 24 * scl);
    }
  } else {
    // 浮水印預覽:重現 drawWmOnPage 的置中/平鋪與旋轉(canvas y 軸向下,角度取負)
    const opEl = document.getElementById("wmOpacity");
    if (opEl) {
      const type = chipState.wmType || "text";
      const opacity = parseFloat(opEl.value);
      const angle = parseInt(document.getElementById("wmAngle").value);
      const layout = document.getElementById("wmLayout").value;
      let srcImg = null, wPt = 0, hPt = 0;
      if (type === "text") {
        const text = (document.getElementById("wmText").value || "").trim();
        if (text) {
          const size = Math.max(12, Math.min(200, parseInt(document.getElementById("wmSize").value) || 48));
          const color = document.getElementById("wmColor").value;
          const r = textToPng(text, size, color);
          srcImg = r.canvas;
          wPt = r.wPt; hPt = r.hPt;
          const maxW = Math.hypot(base.wPt, base.hPt) * 0.65;
          if (wPt > maxW) { hPt *= maxW / wPt; wPt = maxW; }
        }
      } else if (wmLogoImg) {
        const pct = parseFloat(document.getElementById("wmScale").value);
        srcImg = wmLogoImg;
        wPt = base.wPt * pct;
        hPt = (wPt * wmLogoImg.height) / wmLogoImg.width;
      }
      if (srcImg) {
        const w = wPt * scl, h = hPt * scl;
        const th = (angle * Math.PI) / 180;
        ctx.globalAlpha = opacity;
        const draw = (cx, cy) => {
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(-th);
          ctx.drawImage(srcImg, -w / 2, -h / 2, w, h);
          ctx.restore();
        };
        if (layout === "tile") {
          const bw = Math.abs(w * Math.cos(th)) + Math.abs(h * Math.sin(th));
          const bh = Math.abs(w * Math.sin(th)) + Math.abs(h * Math.cos(th));
          const sx2 = bw * 1.3, sy2 = bh * 1.3;
          for (let cy = sy2 / 2; cy < pv.height + sy2 / 2; cy += sy2)
            for (let cx = sx2 / 2; cx < pv.width + sx2 / 2; cx += sx2)
              draw(cx, cy);
        } else {
          draw(pv.width / 2, pv.height / 2);
        }
        ctx.globalAlpha = 1;
      }
    }
  }
  document.getElementById("pvCap").textContent = t("ui.preview");
  box.style.display = "block";
}

async function doReorder() {
  if (!pageOrder.length) throw new Error(t("e.thumbWait"));
  setProgress(20, t("m.rebuild"));
  const src = await loadWithPdfLib(files[0]);
  const out = await PDFDocument.create();
  const pages = await out.copyPages(src, pageOrder);
  pages.forEach(p => out.addPage(p));
  setProgress(90, t("m.out"));
  const bytes = await out.save();
  const blob = new Blob([bytes], { type: "application/pdf" });
  const changed = pageOrder.some((v, i) => v !== i);
  showResult([{ blob, filename: baseName(files[0].name) + "_" + t("f.ro") + ".pdf" }],
    t(changed ? "r.ro" : "r.roSame", { n: pageOrder.length }) + " · " + fmtSize(blob.size));
}

/* ---------------- 合併 ---------------- */
async function doMerge() {
  if (files.length < 2) throw new Error(t("e.two"));
  const out = await PDFDocument.create();
  for (let i = 0; i < files.length; i++) {
    setProgress(10 + (i / files.length) * 80, t("m.merge", { i: i + 1, n: files.length }));
    const src = await loadWithPdfLib(files[i]);
    const pages = await out.copyPages(src, src.getPageIndices());
    pages.forEach(p => out.addPage(p));
  }
  setProgress(95, t("m.out"));
  const bytes = await out.save();
  const blob = new Blob([bytes], { type: "application/pdf" });
  showResult([{ blob, filename: t("f.merge") + ".pdf" }],
    t("r.merge", { n: files.length, p: out.getPageCount() }) + " · " + fmtSize(blob.size));
}

/* ---------------- 分割 ---------------- */
async function doSplit() {
  const src = await loadWithPdfLib(files[0]);
  const total = src.getPageCount();
  const name = baseName(files[0].name);
  let groups;
  if (chipState.splitMode === "every") {
    groups = Array.from({ length: total }, (_, i) => [i]);
  } else {
    groups = parseRangeGroups(document.getElementById("splitRanges").value, total);
  }
  const items = [];
  for (let g = 0; g < groups.length; g++) {
    setProgress(10 + (g / groups.length) * 80, t("m.split", { i: g + 1, n: groups.length }));
    const doc = await PDFDocument.create();
    const pages = await doc.copyPages(src, groups[g]);
    pages.forEach(p => doc.addPage(p));
    const bytes = await doc.save();
    const gp = groups[g];
    const label = gp.length === 1
      ? t("f.page", { n: gp[0] + 1 })
      : t("f.pages", { a: gp[0] + 1, b: gp[gp.length - 1] + 1 });
    items.push({ blob: new Blob([bytes], { type: "application/pdf" }), filename: `${name}_${label}.pdf` });
  }
  if (items.length === 1) {
    showResult(items, t("r.split1", { n: total }));
  } else {
    setProgress(95, t("m.zip"));
    const zip = new JSZip();
    items.forEach(it => zip.file(it.filename, it.blob));
    const zblob = await zip.generateAsync({ type: "blob" });
    showResult([{ blob: zblob, filename: `${name}_${t("f.splitZip")}.zip` }],
      t("r.splitN", { n: items.length }) + " · " + fmtSize(zblob.size));
  }
}

/* ---------------- 壓縮(影像重建) ---------------- */
async function doCompress() {
  const cfg = { low: { scale: 1.6, q: 0.85 }, mid: { scale: 1.4, q: 0.68 }, high: { scale: 1.1, q: 0.5 } }[chipState.compressLevel];
  const origSize = files[0].size;
  const buf = await readBuf(files[0]);
  const pdf = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
  const out = await PDFDocument.create();
  for (let i = 1; i <= pdf.numPages; i++) {
    setProgress(5 + (i / pdf.numPages) * 85, t("m.enc", { i, n: pdf.numPages }));
    const page = await pdf.getPage(i);
    const vp = page.getViewport({ scale: cfg.scale });
    const canvas = document.createElement("canvas");
    canvas.width = Math.floor(vp.width);
    canvas.height = Math.floor(vp.height);
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    await page.render({ canvasContext: ctx, viewport: vp }).promise;
    const dataUrl = canvas.toDataURL("image/jpeg", cfg.q);
    const jpg = await out.embedJpg(dataUrl);
    const orig = page.getViewport({ scale: 1 });
    const p = out.addPage([orig.width, orig.height]);
    p.drawImage(jpg, { x: 0, y: 0, width: orig.width, height: orig.height });
  }
  setProgress(95, t("m.out"));
  const bytes = await out.save();
  const blob = new Blob([bytes], { type: "application/pdf" });
  const saved = Math.max(0, Math.round((1 - blob.size / origSize) * 100));
  showResult([{ blob, filename: baseName(files[0].name) + "_" + t("f.comp") + ".pdf" }],
    t("r.comp", { a: fmtSize(origSize), b: fmtSize(blob.size), s: saved }));
}

/* ---------------- PDF → JPG ---------------- */
async function doPdf2Jpg() {
  const scale = parseFloat(chipState.jpgScale);
  const buf = await readBuf(files[0]);
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const name = baseName(files[0].name);
  const imgs = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    setProgress(5 + (i / pdf.numPages) * 85, t("m.conv", { i, n: pdf.numPages }));
    const page = await pdf.getPage(i);
    const vp = page.getViewport({ scale });
    const canvas = document.createElement("canvas");
    canvas.width = Math.floor(vp.width);
    canvas.height = Math.floor(vp.height);
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    await page.render({ canvasContext: ctx, viewport: vp }).promise;
    const blob = await new Promise(res => canvas.toBlob(res, "image/jpeg", 0.92));
    imgs.push({ blob, filename: `${name}_${t("f.jpgPage", { n: i })}.jpg` });
  }
  if (imgs.length === 1) {
    showResult(imgs, t("r.jpg1") + " · " + fmtSize(imgs[0].blob.size));
  } else {
    setProgress(95, t("m.zip"));
    const zip = new JSZip();
    imgs.forEach(it => zip.file(it.filename, it.blob));
    const zblob = await zip.generateAsync({ type: "blob" });
    showResult([{ blob: zblob, filename: `${name}_${t("f.imgZip")}.zip` }],
      t("r.jpgN", { n: imgs.length }) + " · " + fmtSize(zblob.size));
  }
}

/* ---------------- 圖片 → PDF ---------------- */
async function doImg2Pdf() {
  const mode = document.getElementById("imgPageSize").value;
  const A4 = [595.28, 841.89];
  const out = await PDFDocument.create();
  for (let i = 0; i < files.length; i++) {
    setProgress(5 + (i / files.length) * 85, t("m.img", { i: i + 1, n: files.length }));
    const buf = await readBuf(files[i]);
    let img;
    if (/\.png$/i.test(files[i].name)) img = await out.embedPng(buf);
    else img = await out.embedJpg(buf);
    let pw, ph;
    if (mode === "fit") { pw = img.width; ph = img.height; }
    else if (mode === "a4p") { pw = A4[0]; ph = A4[1]; }
    else { pw = A4[1]; ph = A4[0]; }
    const page = out.addPage([pw, ph]);
    const ratio = Math.min(pw / img.width, ph / img.height, mode === "fit" ? 1 : Infinity);
    const w = img.width * ratio, h = img.height * ratio;
    page.drawImage(img, { x: (pw - w) / 2, y: (ph - h) / 2, width: w, height: h });
  }
  setProgress(95, t("m.out"));
  const bytes = await out.save();
  const blob = new Blob([bytes], { type: "application/pdf" });
  showResult([{ blob, filename: t("f.imgPdf") + ".pdf" }],
    t("r.img", { n: files.length }) + " · " + fmtSize(blob.size));
}

/* ---------------- 旋轉 ---------------- */
async function doRotate() {
  const deg = parseInt(chipState.rotateDeg);
  const doc = await loadWithPdfLib(files[0]);
  const total = doc.getPageCount();
  const sel = parsePages(document.getElementById("rotatePages").value, total);
  const targets = sel || doc.getPageIndices();
  targets.forEach(i => {
    const p = doc.getPage(i);
    p.setRotation(degrees(((p.getRotation().angle + deg) % 360 + 360) % 360));
  });
  setProgress(90, t("m.out"));
  const bytes = await doc.save();
  const blob = new Blob([bytes], { type: "application/pdf" });
  showResult([{ blob, filename: baseName(files[0].name) + "_" + t("f.rot") + ".pdf" }],
    t("r.rot", { n: targets.length }) + " · " + fmtSize(blob.size));
}

/* ---------------- 裁剪 ---------------- */
const MM = 72 / 25.4;
async function doCrop() {
  const ct = (parseFloat(document.getElementById("cropT").value) || 0) * MM;
  const cb = (parseFloat(document.getElementById("cropB").value) || 0) * MM;
  const cl = (parseFloat(document.getElementById("cropL").value) || 0) * MM;
  const cr = (parseFloat(document.getElementById("cropR").value) || 0) * MM;
  if (ct + cb + cl + cr === 0) throw new Error(t("e.cropZero"));
  const doc = await loadWithPdfLib(files[0]);
  const total = doc.getPageCount();
  const sel = parsePages(document.getElementById("cropPages").value, total);
  const targets = sel || doc.getPageIndices();
  for (const i of targets) {
    const p = doc.getPage(i);
    const mb = p.getMediaBox();
    const w = mb.width - cl - cr;
    const h = mb.height - ct - cb;
    if (w <= 20 || h <= 20)
      throw new Error(t("e.cropBig", { i: i + 1, w: Math.round(mb.width / MM), h: Math.round(mb.height / MM) }));
    p.setCropBox(mb.x + cl, mb.y + cb, w, h);
  }
  setProgress(90, t("m.out"));
  const bytes = await doc.save();
  const blob = new Blob([bytes], { type: "application/pdf" });
  showResult([{ blob, filename: baseName(files[0].name) + "_" + t("f.crop") + ".pdf" }],
    t("r.crop", { n: targets.length }) + " · " + fmtSize(blob.size));
}

/* ---------------- 修復(輕度:重建結構) ---------------- */
async function doRepair() {
  setProgress(30, t("m.repair"));
  let doc;
  try {
    doc = await PDFDocument.load(await readBuf(files[0]), {
      ignoreEncryption: true,
      throwOnInvalidObject: false,
    });
  } catch (e) {
    throw new Error(t("e.repair"));
  }
  setProgress(80, t("m.repairOut"));
  const bytes = await doc.save({ useObjectStreams: false });
  const blob = new Blob([bytes], { type: "application/pdf" });
  showResult([{ blob, filename: baseName(files[0].name) + "_" + t("f.rep") + ".pdf" }],
    t("r.rep", { n: doc.getPageCount() }) + " · " + fmtSize(blob.size));
}

/* ---------------- 刪除頁面 ---------------- */
async function doDelete() {
  const doc = await loadWithPdfLib(files[0]);
  const total = doc.getPageCount();
  const del = parsePages(document.getElementById("deletePages").value, total);
  if (!del) throw new Error(t("e.delNeed"));
  if (del.length >= total) throw new Error(t("e.delAll"));
  const keep = doc.getPageIndices().filter(i => !del.includes(i));
  const out = await PDFDocument.create();
  const pages = await out.copyPages(doc, keep);
  pages.forEach(p => out.addPage(p));
  setProgress(90, t("m.out"));
  const bytes = await out.save();
  const blob = new Blob([bytes], { type: "application/pdf" });
  showResult([{ blob, filename: baseName(files[0].name) + "_" + t("f.del") + ".pdf" }],
    t("r.del", { d: del.length, k: keep.length }) + " · " + fmtSize(blob.size));
}

/* ---------------- 擷取頁面 ---------------- */
async function doExtract() {
  const doc = await loadWithPdfLib(files[0]);
  const total = doc.getPageCount();
  const sel = parsePages(document.getElementById("extractPages").value, total);
  if (!sel) throw new Error(t("e.extNeed"));
  const out = await PDFDocument.create();
  const pages = await out.copyPages(doc, sel);
  pages.forEach(p => out.addPage(p));
  setProgress(90, t("m.out"));
  const bytes = await out.save();
  const blob = new Blob([bytes], { type: "application/pdf" });
  showResult([{ blob, filename: baseName(files[0].name) + "_" + t("f.ext") + ".pdf" }],
    t("r.ext", { n: sel.length }) + " · " + fmtSize(blob.size));
}

/* ---------------- 頁碼 ---------------- */
async function doPageNum() {
  const doc = await loadWithPdfLib(files[0]);
  const font = await doc.embedFont(StandardFonts.Helvetica);
  const size = Math.max(6, Math.min(36, parseInt(document.getElementById("pnSize").value) || 11));
  const pos = document.getElementById("pnPos").value;
  const fmt = document.getElementById("pnFmt").value;
  const total = doc.getPageCount();
  doc.getPages().forEach((p, i) => {
    const label = fmt === "slash" ? `${i + 1} / ${total}` : fmt === "dash" ? `- ${i + 1} -` : `${i + 1}`;
    const { width } = p.getSize();
    const tw = font.widthOfTextAtSize(label, size);
    const x = pos === "bc" ? (width - tw) / 2 : pos === "br" ? width - tw - 36 : 36;
    p.drawText(label, { x, y: 24, size, font, color: rgb(0.25, 0.23, 0.22) });
  });
  setProgress(90, t("m.out"));
  const bytes = await doc.save();
  const blob = new Blob([bytes], { type: "application/pdf" });
  showResult([{ blob, filename: baseName(files[0].name) + "_" + t("f.pn") + ".pdf" }],
    t("r.pn", { n: total }) + " · " + fmtSize(blob.size));
}

/* ---------------- 浮水印(文字任何語言 / Logo 圖片) ---------------- */
function toggleWmRows() {
  const tr = document.getElementById("wmTextRow");
  const ir = document.getElementById("wmImgRow");
  if (!tr || !ir) return;
  const isText = (chipState.wmType || "text") === "text";
  tr.style.display = isText ? "flex" : "none";
  ir.style.display = isText ? "none" : "flex";
}

// 用 Canvas 以瀏覽器內建字型渲染文字 → 高解析 PNG(支援任何語言,免下載字型檔)
function textToPng(text, sizePt, colorCss) {
  const k = 3;
  const canvas = document.createElement("canvas");
  let ctx = canvas.getContext("2d");
  const fontCss = `700 ${sizePt * k}px "Noto Sans TC","Microsoft JhengHei","PingFang TC","Hiragino Sans","Malgun Gothic",sans-serif`;
  ctx.font = fontCss;
  const m = ctx.measureText(text);
  const pad = sizePt * k * 0.15;
  canvas.width = Math.ceil(m.width + pad * 2);
  canvas.height = Math.ceil(sizePt * k * 1.4);
  ctx = canvas.getContext("2d");
  ctx.font = fontCss;
  ctx.fillStyle = colorCss;
  ctx.textBaseline = "middle";
  ctx.fillText(text, pad, canvas.height / 2);
  return { canvas, wPt: canvas.width / k, hPt: canvas.height / k };
}

// 以「浮水印中心點」為基準繪製(pdf-lib 的 rotate 以左下角為軸,需換算)
function drawWmOnPage(page, img, w, h, angleDeg, opacity, layout) {
  const { width, height } = page.getSize();
  const th = (angleDeg * Math.PI) / 180;
  const place = (cx, cy) => {
    const x = cx - (w / 2) * Math.cos(th) + (h / 2) * Math.sin(th);
    const y = cy - (w / 2) * Math.sin(th) - (h / 2) * Math.cos(th);
    page.drawImage(img, { x, y, width: w, height: h, opacity, rotate: degrees(angleDeg) });
  };
  if (layout === "tile") {
    const bw = Math.abs(w * Math.cos(th)) + Math.abs(h * Math.sin(th));
    const bh = Math.abs(w * Math.sin(th)) + Math.abs(h * Math.cos(th));
    const sx = bw * 1.3, sy = bh * 1.3;
    for (let cy = sy / 2; cy < height + sy / 2; cy += sy)
      for (let cx = sx / 2; cx < width + sx / 2; cx += sx)
        place(cx, cy);
  } else {
    place(width / 2, height / 2);
  }
}

async function doWatermark() {
  const type = chipState.wmType || "text";
  const opacity = parseFloat(document.getElementById("wmOpacity").value);
  const angle = parseInt(document.getElementById("wmAngle").value);
  const layout = document.getElementById("wmLayout").value;
  const doc = await loadWithPdfLib(files[0]);

  let img, natW = null, natH = null, pctMode = false, pct = 0.3;
  if (type === "text") {
    const text = (document.getElementById("wmText").value || "").trim();
    if (!text) throw new Error(t("e.wmText"));
    const size = Math.max(12, Math.min(200, parseInt(document.getElementById("wmSize").value) || 48));
    const color = document.getElementById("wmColor").value;
    setProgress(20, t("m.wmRender"));
    const r = textToPng(text, size, color);
    img = await doc.embedPng(r.canvas.toDataURL("image/png"));
    natW = r.wPt; natH = r.hPt;
  } else {
    const f = document.getElementById("wmImgFile").files[0];
    if (!f) throw new Error(t("e.logo"));
    setProgress(20, t("m.logoRead"));
    const buf = await f.arrayBuffer();
    const u8 = new Uint8Array(buf);
    if (u8[0] === 0x89 && u8[1] === 0x50) img = await doc.embedPng(buf);
    else if (u8[0] === 0xFF && u8[1] === 0xD8) img = await doc.embedJpg(buf);
    else throw new Error(t("e.logoFmt"));
    pctMode = true;
    pct = parseFloat(document.getElementById("wmScale").value);
  }

  setProgress(50, t("m.apply"));
  doc.getPages().forEach(p => {
    const { width, height } = p.getSize();
    let w, h;
    if (pctMode) {
      w = width * pct;
      h = (w * img.height) / img.width;
    } else {
      w = natW; h = natH;
      const maxW = Math.hypot(width, height) * 0.65;
      if (w > maxW) { h *= maxW / w; w = maxW; }
    }
    drawWmOnPage(p, img, w, h, angle, opacity, layout);
  });

  setProgress(90, t("m.out"));
  const bytes = await doc.save();
  const blob = new Blob([bytes], { type: "application/pdf" });
  showResult([{ blob, filename: baseName(files[0].name) + "_" + t("f.wm") + ".pdf" }],
    t(type === "text" ? "r.wmT" : "r.wmL", { n: doc.getPageCount() }) + " · " + fmtSize(blob.size));
}
